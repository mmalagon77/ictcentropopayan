<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trivia L5 | El Perdón</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <!-- Google Fonts: Outfit -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Outfit', 'sans-serif'],
                    },
                    colors: {
                        brand: {
                            50: '#f0fdfa',
                            100: '#ccfbf1',
                            500: '#14b8a6',
                            600: '#0d9488',
                            700: '#0f766e',
                        }
                    }
                }
            }
        }
    </script>
    <style>
        .glass-panel {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(226, 232, 240, 0.8);
        }
        .option-card {
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .option-card:active {
            transform: scale(0.98);
        }
        .progress-bar {
            transition: width 0.4s ease-in-out;
        }
        @keyframes slideIn {
            from { opacity: 0; transform: translateX(20px); }
            to { opacity: 1; transform: translateX(0); }
        }
        .animate-slide {
            animation: slideIn 0.3s ease-out forwards;
        }
    </style>
</head>
<body class="bg-slate-50 min-h-screen font-sans text-slate-900 flex flex-col">

    <!-- Navbar Minimalista -->
    <nav class="p-6">
        <div class="max-w-3xl mx-auto flex justify-between items-center">
            <a href="Leccion_5.html" class="flex items-center gap-2 text-slate-500 hover:text-brand-600 font-bold transition-colors">
                <i data-lucide="x" class="w-5 h-5"></i>
                <span>Salir</span>
            </a>
            <div class="flex items-center gap-2 text-brand-600">
                <span id="current-step" class="font-black">1</span>
                <span class="text-slate-300">/</span>
                <span id="total-steps" class="text-slate-400 font-bold">10</span>
            </div>
        </div>
    </nav>

    <!-- Barra de Progreso Superior -->
    <div class="w-full h-1.5 bg-slate-200">
        <div id="progress" class="progress-bar h-full bg-brand-600 w-[10%]"></div>
    </div>

    <main class="flex-grow flex items-center justify-center p-6">
        <div class="max-w-2xl w-full">
            
            <!-- Contenedor de Preguntas -->
            <div id="quiz-container" class="glass-panel rounded-[2.5rem] p-8 md:p-12 shadow-2xl shadow-teal-500/10 relative overflow-hidden">
                <div id="question-area" class="animate-slide">
                    <!-- Contenido dinámico por JS -->
                </div>
            </div>

            <!-- Pantalla de Resultados -->
            <div id="result-screen" class="hidden text-center animate-slide">
                <div id="result-icon-container" class="w-24 h-24 rounded-full flex items-center justify-center mx-auto mb-8 shadow-xl">
                    <!-- Icono dinámico -->
                </div>
                <h2 id="result-title" class="text-4xl font-black mb-4 text-slate-900">¡Corazón Sano!</h2>
                <p id="result-text" class="text-lg text-slate-500 mb-10 leading-relaxed"></p>
                
                <div class="flex flex-col gap-4 max-w-sm mx-auto">
                    <button onclick="location.reload()" id="btn-retry" class="hidden w-full py-4 bg-white border border-slate-200 rounded-2xl font-bold hover:bg-slate-50 transition-all">
                        Intentar de Nuevo
                    </button>
                    <a href="index_e.html" class="w-full py-4 bg-brand-600 text-white rounded-2xl font-bold shadow-lg shadow-brand-500/30 hover:bg-brand-700 transition-all">
                        Volver a Módulos
                    </a>
                </div>
            </div>

        </div>
    </main>

    <script>
        const quizData = [
            {
                question: "¿En qué consiste la dinámica de la 'respiración espiritual'?",
                options: ["Un ejercicio de yoga", "Inhalar el perdón de Dios y exhalar el pecado", "Aprender a cantar himnos"],
                correct: 1
            },
            {
                question: "En la analogía de la respiración, ¿qué representa el acto de 'inhalar'?",
                options: ["Recibir la Gracia y el perdón total de Dios", "Guardar rencor por lo que nos hicieron", "Tratar de ser perfectos por nuestra cuenta"],
                correct: 0
            },
            {
                question: "¿Qué representa el acto de 'exhalar' en nuestra vida espiritual?",
                options: ["Olvidar todo sin hablar con Dios", "Confesar aquello que nos separa de Dios y soltar las cargas", "Enojarme con las personas que me fallan"],
                correct: 1
            },
            {
                question: "¿Cuál es el resultado de confesar y soltar nuestras cargas (exhalar)?",
                options: ["Quedarnos vacíos", "Liberarnos del pasado y de la culpa", "Sentirnos más pesados"],
                correct: 1
            },
            {
                question: "¿Qué debemos aceptar primero para poder perdonar a otros?",
                options: ["Que somos mejores que los demás", "El perdón total que Dios ya nos dio a través de Cristo", "Que la otra persona no tuvo la culpa"],
                correct: 1
            },
            {
                question: "¿Por qué el perdón es vital para el cristiano?",
                options: ["Porque es como respirar: sin él, nuestra vida espiritual se ahoga", "Porque es una regla aburrida", "Porque nos hace famosos"],
                correct: 0
            },
            {
                question: "¿Es el perdón una emoción que debemos esperar a sentir?",
                options: ["Sí, solo se perdona cuando ya no duele", "No, es una decisión basada en la Verdad de Dios", "Depende de lo que diga mi horóscopo"],
                correct: 1
            },
            {
                question: "¿Qué sucede con el pecado cuando lo 'exhalamos' mediante la confesión?",
                options: ["Dios lo usa para castigarnos luego", "Somos limpios y restaurados por Su fidelidad", "Se queda guardado en una lista"],
                correct: 1
            },
            {
                question: "¿Cuál es el 'antídoto' contra la amargura según esta lección?",
                options: ["Ignorar a la gente", "Practicar la respiración espiritual constantemente", "Cambiar de ciudad"],
                correct: 1
            },
            {
                question: "El objetivo final de vivir en perdón es:",
                options: ["Tener la razón siempre", "Vivir en libertad y sanidad integral", "Que todos me pidan perdón a mí"],
                correct: 1
            }
        ];

        let currentQuestion = 0;
        let score = 0;

        const questionArea = document.getElementById('question-area');
        const progress = document.getElementById('progress');
        const currentStepLabel = document.getElementById('current-step');
        const quizContainer = document.getElementById('quiz-container');
        const resultScreen = document.getElementById('result-screen');

        function loadQuestion() {
            const data = quizData[currentQuestion];
            currentStepLabel.innerText = currentQuestion + 1;
            progress.style.width = ((currentQuestion + 1) / quizData.length * 100) + '%';

            questionArea.innerHTML = `
                <h3 class="text-2xl md:text-3xl font-black mb-10 leading-tight text-slate-800">${data.question}</h3>
                <div class="grid gap-4">
                    ${data.options.map((option, index) => `
                        <button onclick="checkAnswer(${index})" class="option-card w-full p-6 text-left rounded-3xl border-2 border-slate-100 hover:border-brand-500 hover:bg-brand-50 font-bold text-slate-700 transition-all flex items-center justify-between group">
                            <span>${option}</span>
                            <i data-lucide="circle" class="w-5 h-5 text-slate-200 group-hover:text-brand-500"></i>
                        </button>
                    `).join('')}
                </div>
            `;
            lucide.createIcons();
        }

        function checkAnswer(selected) {
            if (selected === quizData[currentQuestion].correct) {
                score++;
            }

            currentQuestion++;

            if (currentQuestion < quizData.length) {
                questionArea.classList.remove('animate-slide');
                void questionArea.offsetWidth; 
                questionArea.classList.add('animate-slide');
                loadQuestion();
            } else {
                showResults();
            }
        }

        function showResults() {
            quizContainer.classList.add('hidden');
            resultScreen.classList.remove('hidden');
            
            const pass = score >= 7;
            const iconContainer = document.getElementById('result-icon-container');
            const title = document.getElementById('result-title');
            const text = document.getElementById('result-text');
            const retryBtn = document.getElementById('btn-retry');

            if (pass) {
                iconContainer.className = "w-24 h-24 rounded-full flex items-center justify-center mx-auto mb-8 shadow-xl bg-teal-100 text-teal-600";
                iconContainer.innerHTML = '<i data-lucide="wind" class="w-12 h-12"></i>';
                title.innerText = "¡Libertad Total!";
                text.innerText = `Has comprendido la importancia del perdón. Lograste ${score} de ${quizData.length} aciertos. ¡Sigue respirando Su gracia!`;
            } else {
                iconContainer.className = "w-24 h-24 rounded-full flex items-center justify-center mx-auto mb-8 shadow-xl bg-red-100 text-red-600";
                iconContainer.innerHTML = '<i data-lucide="heart-off" class="w-12 h-12"></i>';
                title.innerText = "Sigue Practicando";
                text.innerText = `Lograste ${score} aciertos. El concepto de respiración espiritual es clave para tu sanidad (mínimo 7). ¡Vuelve a intentarlo!`;
                retryBtn.classList.remove('hidden');
            }
            lucide.createIcons();
        }

        loadQuestion();
    </script>
</body>
</html>
