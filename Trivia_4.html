<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trivia L4 | Su Presencia</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <!-- Google Fonts: Outfit -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Outfit', 'sans-serif'],
                    },
                    colors: {
                        brand: {
                            50: '#f0f9ff',
                            100: '#e0f2fe',
                            500: '#0ea5e9',
                            600: '#0284c7',
                            700: '#0369a1',
                        }
                    }
                }
            }
        }
    </script>
    <style>
        .glass-panel {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(226, 232, 240, 0.8);
        }
        .option-card {
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .option-card:active {
            transform: scale(0.98);
        }
        .progress-bar {
            transition: width 0.4s ease-in-out;
        }
        @keyframes slideIn {
            from { opacity: 0; transform: translateX(20px); }
            to { opacity: 1; transform: translateX(0); }
        }
        .animate-slide {
            animation: slideIn 0.3s ease-out forwards;
        }
    </style>
</head>
<body class="bg-slate-50 min-h-screen font-sans text-slate-900 flex flex-col">

    <!-- Navegación Superior -->
    <nav class="p-6">
        <div class="max-w-3xl mx-auto flex justify-between items-center">
            <a href="Leccion_4.html" class="flex items-center gap-2 text-slate-500 hover:text-brand-600 font-bold transition-colors">
                <i data-lucide="x" class="w-5 h-5"></i>
                <span>Salir</span>
            </a>
            <div class="flex items-center gap-2 text-brand-600">
                <span id="current-step" class="font-black">1</span>
                <span class="text-slate-300">/</span>
                <span id="total-steps" class="text-slate-400 font-bold">10</span>
            </div>
        </div>
    </nav>

    <!-- Barra de Progreso -->
    <div class="w-full h-1.5 bg-slate-200">
        <div id="progress" class="progress-bar h-full bg-brand-500 w-[10%]"></div>
    </div>

    <main class="flex-grow flex items-center justify-center p-6">
        <div class="max-w-2xl w-full">
            
            <!-- Contenedor de la Pregunta -->
            <div id="quiz-container" class="glass-panel rounded-[2.5rem] p-8 md:p-12 shadow-2xl shadow-sky-500/10 relative overflow-hidden">
                <div id="question-area" class="animate-slide">
                    <!-- Se llena con JS -->
                </div>
            </div>

            <!-- Pantalla de Resultados (Oculta al inicio) -->
            <div id="result-screen" class="hidden text-center animate-slide">
                <div id="result-icon-container" class="w-24 h-24 rounded-full flex items-center justify-center mx-auto mb-8 shadow-xl">
                    <!-- Icono dinámico -->
                </div>
                <h2 id="result-title" class="text-4xl font-black mb-4 text-slate-900">¡Reto Completado!</h2>
                <p id="result-text" class="text-lg text-slate-500 mb-10 leading-relaxed"></p>
                
                <div class="flex flex-col gap-4 max-w-sm mx-auto">
                    <button onclick="location.reload()" id="btn-retry" class="hidden w-full py-4 bg-white border border-slate-200 rounded-2xl font-bold hover:bg-slate-50 transition-all">
                        Intentar de Nuevo
                    </button>
                    <a href="index_e.html" class="w-full py-4 bg-brand-600 text-white rounded-2xl font-bold shadow-lg shadow-brand-500/30 hover:bg-brand-700 transition-all">
                        Volver a Módulos
                    </a>
                </div>
            </div>

        </div>
    </main>

    <script>
        const quizData = [
            {
                question: "¿Qué es la soledad según el enfoque de la Teoterapia?",
                options: ["Estar físicamente sin personas alrededor", "La ausencia de la consciencia de la presencia de Dios", "Un sentimiento que nunca se puede quitar"],
                correct: 1
            },
            {
                question: "¿Cuál es la promesa clave de Jesús en Mateo 28:20?",
                options: ["Que solo estará con los santos", "Que estará con nosotros todos los días hasta el fin", "Que nos visitará de vez en cuando"],
                correct: 1
            },
            {
                question: "El Espíritu Santo es el 'Paracleto', lo que significa que Dios es nuestro:",
                options: ["Juez severo", "Consolador que camina a nuestro lado", "Fuerza lejana e impersonal"],
                correct: 1
            },
            {
                question: "¿Depende la presencia de Dios de que nosotros 'sintamos' algo?",
                options: ["Sí, si no se siente, no está", "No, es un hecho basado en Su Palabra, no en sentimientos", "Solo depende de si estamos alegres"],
                correct: 1
            },
            {
                question: "¿Cuál es el antídoto definitivo contra el sentimiento de soledad?",
                options: ["Tener muchos seguidores en redes sociales", "Practicar la consciencia de la compañía constante de Dios", "Mantenerse ocupado todo el tiempo para no pensar"],
                correct: 1
            },
            {
                question: "Al caminar con Dios, los problemas de la vida:",
                options: ["Desaparecen mágicamente", "Siguen existiendo, pero nunca los enfrentamos solos", "Se vuelven mucho más pesados"],
                correct: 1
            },
            {
                question: "¿Dónde prometió Dios habitar en el nuevo pacto?",
                options: ["Solo en los templos de piedra", "En el corazón de cada persona que cree en Cristo", "En lo más alto de las montañas"],
                correct: 1
            },
            {
                question: "¿Cómo se 'practica' la presencia de Dios?",
                options: ["Reconociendo Su compañía en cada momento del día", "Encerrándose todo el día en una habitación", "Solo leyendo la Biblia 10 horas seguidas"],
                correct: 0
            },
            {
                question: "¿Cuál es la diferencia entre estar solo y sentirse solo?",
                options: ["Son lo mismo", "Estar solo es físico; sentirse solo es una desconexión espiritual", "Estar solo es malo y sentirse solo es bueno"],
                correct: 1
            },
            {
                question: "La seguridad del cristiano sobre Su compañía se basa en:",
                options: ["Las emociones del momento", "Los hechos de la Palabra de Dios", "La opinión de las personas"],
                correct: 1
            }
        ];

        let currentQuestion = 0;
        let score = 0;

        const questionArea = document.getElementById('question-area');
        const progress = document.getElementById('progress');
        const currentStepLabel = document.getElementById('current-step');
        const quizContainer = document.getElementById('quiz-container');
        const resultScreen = document.getElementById('result-screen');

        function loadQuestion() {
            const data = quizData[currentQuestion];
            currentStepLabel.innerText = currentQuestion + 1;
            progress.style.width = ((currentQuestion + 1) / quizData.length * 100) + '%';

            questionArea.innerHTML = `
                <h3 class="text-2xl md:text-3xl font-black mb-10 leading-tight text-slate-800">${data.question}</h3>
                <div class="grid gap-4">
                    ${data.options.map((option, index) => `
                        <button onclick="checkAnswer(${index})" class="option-card w-full p-6 text-left rounded-3xl border-2 border-slate-100 hover:border-brand-500 hover:bg-brand-50 font-bold text-slate-700 transition-all flex items-center justify-between group">
                            <span>${option}</span>
                            <i data-lucide="circle" class="w-5 h-5 text-slate-200 group-hover:text-brand-500"></i>
                        </button>
                    `).join('')}
                </div>
            `;
            lucide.createIcons();
        }

        function checkAnswer(selected) {
            if (selected === quizData[currentQuestion].correct) {
                score++;
            }

            currentQuestion++;

            if (currentQuestion < quizData.length) {
                questionArea.classList.remove('animate-slide');
                void questionArea.offsetWidth; 
                questionArea.classList.add('animate-slide');
                loadQuestion();
            } else {
                showResults();
            }
        }

        function showResults() {
            quizContainer.classList.add('hidden');
            resultScreen.classList.remove('hidden');
            
            const pass = score >= 7;
            const iconContainer = document.getElementById('result-icon-container');
            const title = document.getElementById('result-title');
            const text = document.getElementById('result-text');
            const retryBtn = document.getElementById('btn-retry');

            if (pass) {
                iconContainer.className = "w-24 h-24 rounded-full flex items-center justify-center mx-auto mb-8 shadow-xl bg-sky-100 text-sky-600";
                iconContainer.innerHTML = '<i data-lucide="shield-check" class="w-12 h-12"></i>';
                title.innerText = "¡Compañía Confirmada!";
                text.innerText = `Has demostrado que comprendes el regalo de Su Presencia. Lograste ${score} de ${quizData.length} aciertos. ¡Nunca estás solo!`;
            } else {
                iconContainer.className = "w-24 h-24 rounded-full flex items-center justify-center mx-auto mb-8 shadow-xl bg-red-100 text-red-600";
                iconContainer.innerHTML = '<i data-lucide="cloud-off" class="w-12 h-12"></i>';
                title.innerText = "Sigue Buscando";
                text.innerText = `Lograste ${score} aciertos. Necesitamos que la promesa de Su compañía sea un hecho firme en tu vida (mínimo 7). ¡Vuelve a intentarlo!`;
                retryBtn.classList.remove('hidden');
            }
            lucide.createIcons();
        }

        loadQuestion();
    </script>
</body>
</html>
