<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trivia L3 | Las Bases de Nuestra Vida</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <!-- Google Fonts: Outfit -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Outfit', 'sans-serif'],
                    },
                    colors: {
                        brand: {
                            50: '#fff7ed',
                            100: '#ffedd5',
                            500: '#f97316',
                            600: '#ea580c',
                            700: '#c2410c',
                        }
                    }
                }
            }
        }
    </script>
    <style>
        .glass-panel {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(226, 232, 240, 0.8);
        }
        .option-card {
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .option-card:active {
            transform: scale(0.98);
        }
        .progress-bar {
            transition: width 0.4s ease-in-out;
        }
        @keyframes slideIn {
            from { opacity: 0; transform: translateX(20px); }
            to { opacity: 1; transform: translateX(0); }
        }
        .animate-slide {
            animation: slideIn 0.3s ease-out forwards;
        }
    </style>
</head>
<body class="bg-slate-50 min-h-screen font-sans text-slate-900 flex flex-col">

    <!-- Navbar Minimalista -->
    <nav class="p-6">
        <div class="max-w-3xl mx-auto flex justify-between items-center">
            <a href="Leccion_3.html" class="flex items-center gap-2 text-slate-500 hover:text-brand-600 font-bold transition-colors">
                <i data-lucide="x" class="w-5 h-5"></i>
                <span>Salir</span>
            </a>
            <div class="flex items-center gap-2 text-brand-600">
                <span id="current-step" class="font-black">1</span>
                <span class="text-slate-300">/</span>
                <span id="total-steps" class="text-slate-400 font-bold">10</span>
            </div>
        </div>
    </nav>

    <!-- Barra de Progreso Superior -->
    <div class="w-full h-1.5 bg-slate-200">
        <div id="progress" class="progress-bar h-full bg-brand-600 w-[10%]"></div>
    </div>

    <main class="flex-grow flex items-center justify-center p-6">
        <div class="max-w-2xl w-full">
            
            <!-- Contenedor de Preguntas -->
            <div id="quiz-container" class="glass-panel rounded-[2.5rem] p-8 md:p-12 shadow-2xl shadow-orange-500/10 relative overflow-hidden">
                <div id="question-area" class="animate-slide">
                    <!-- Contenido dinámico -->
                </div>
            </div>

            <!-- Pantalla de Resultados -->
            <div id="result-screen" class="hidden text-center animate-slide">
                <div id="result-icon-container" class="w-24 h-24 rounded-full flex items-center justify-center mx-auto mb-8 shadow-xl">
                    <!-- Icono dinámico -->
                </div>
                <h2 id="result-title" class="text-4xl font-black mb-4 text-slate-900">¡Cimientos Verificados!</h2>
                <p id="result-text" class="text-lg text-slate-500 mb-10 leading-relaxed"></p>
                
                <div class="flex flex-col gap-4 max-w-sm mx-auto">
                    <button onclick="location.reload()" id="btn-retry" class="hidden w-full py-4 bg-white border border-slate-200 rounded-2xl font-bold hover:bg-slate-50 transition-all">
                        Intentar de Nuevo
                    </button>
                    <a href="index_e.html" class="w-full py-4 bg-brand-600 text-white rounded-2xl font-bold shadow-lg shadow-brand-500/30 hover:bg-brand-700 transition-all">
                        Volver a Módulos
                    </a>
                </div>
            </div>

        </div>
    </main>

    <script>
        const quizData = [
            {
                question: "¿Cuál es el fundamento inamovible sobre el cual un cristiano debe construir?",
                options: ["Sus buenas obras", "Jesucristo (La Roca)", "Su situación económica"],
                correct: 1
            },
            {
                question: "Según la analogía, ¿qué representa construir sobre la 'arena'?",
                options: ["Basar la vida en emociones y circunstancias", "Estudiar la Biblia a diario", "Tener amigos en la iglesia"],
                correct: 0
            },
            {
                question: "¿Qué sucede con la casa construida sobre la roca cuando llegan las tormentas?",
                options: ["Se derrumba parcialmente", "Permanece firme", "Se mueve de lugar"],
                correct: 1
            },
            {
                question: "¿Qué representan la lluvia y el viento en la parábola de la construcción?",
                options: ["Las bendiciones de Dios", "Las pruebas y dificultades de la vida", "El clima de la región"],
                correct: 1
            },
            {
                question: "¿Cuál es la principal característica de la arena como base para una vida?",
                options: ["Es muy barata", "Es inestable y cambia constantemente", "Es muy dura"],
                correct: 1
            },
            {
                question: "¿Cómo se profundizan los cimientos espirituales en nuestra vida?",
                options: ["Ignorando los problemas", "A través de la obediencia a la Palabra de Dios", "Haciendo mucha fuerza mental"],
                correct: 1
            },
            {
                question: "Construir sobre la Roca garantiza que nuestra vida...",
                options: ["No tendrá nunca problemas", "No colapsará ante las crisis", "Será siempre fácil"],
                correct: 1
            },
            {
                question: "¿Es posible cambiar el cimiento de una vida que ya ha sido construida?",
                options: ["No, es imposible", "Solo si tenemos dinero", "Sí, a través del arrepentimiento y la fe en Cristo"],
                correct: 2
            },
            {
                question: "¿Qué ocurre si una vida se ve perfecta por fuera pero tiene base de arena?",
                options: ["Nada, lo exterior es lo que cuenta", "Se derrumba cuando llega la crisis verdadera", "Dios la sostiene por lástima"],
                correct: 1
            },
            {
                question: "La 'Roca' en esta lección es una metáfora de:",
                options: ["Las verdades eternas de Dios", "La fuerza física del hombre", "La terquedad humana"],
                correct: 0
            }
        ];

        let currentQuestion = 0;
        let score = 0;

        const questionArea = document.getElementById('question-area');
        const progress = document.getElementById('progress');
        const currentStepLabel = document.getElementById('current-step');
        const quizContainer = document.getElementById('quiz-container');
        const resultScreen = document.getElementById('result-screen');

        function loadQuestion() {
            const data = quizData[currentQuestion];
            currentStepLabel.innerText = currentQuestion + 1;
            progress.style.width = ((currentQuestion + 1) / quizData.length * 100) + '%';

            questionArea.innerHTML = `
                <h3 class="text-2xl md:text-3xl font-black mb-10 leading-tight text-slate-800">${data.question}</h3>
                <div class="grid gap-4">
                    ${data.options.map((option, index) => `
                        <button onclick="checkAnswer(${index})" class="option-card w-full p-6 text-left rounded-3xl border-2 border-slate-100 hover:border-brand-500 hover:bg-brand-50 font-bold text-slate-700 transition-all flex items-center justify-between group">
                            <span>${option}</span>
                            <i data-lucide="circle" class="w-5 h-5 text-slate-200 group-hover:text-brand-500"></i>
                        </button>
                    `).join('')}
                </div>
            `;
            lucide.createIcons();
        }

        function checkAnswer(selected) {
            if (selected === quizData[currentQuestion].correct) {
                score++;
            }

            currentQuestion++;

            if (currentQuestion < quizData.length) {
                questionArea.classList.remove('animate-slide');
                void questionArea.offsetWidth; 
                questionArea.classList.add('animate-slide');
                loadQuestion();
            } else {
                showResults();
            }
        }

        function showResults() {
            quizContainer.classList.add('hidden');
            resultScreen.classList.remove('hidden');
            
            const pass = score >= 7;
            const iconContainer = document.getElementById('result-icon-container');
            const title = document.getElementById('result-title');
            const text = document.getElementById('result-text');
            const retryBtn = document.getElementById('btn-retry');

            if (pass) {
                iconContainer.className = "w-24 h-24 rounded-full flex items-center justify-center mx-auto mb-8 shadow-xl bg-orange-100 text-orange-600";
                iconContainer.innerHTML = '<i data-lucide="construction" class="w-12 h-12"></i>';
                title.innerText = "¡Base Sólida!";
                text.innerText = `Has demostrado que sabes sobre qué construir. Lograste ${score} de ${quizData.length} aciertos. ¡Tu casa está sobre la Roca!`;
            } else {
                iconContainer.className = "w-24 h-24 rounded-full flex items-center justify-center mx-auto mb-8 shadow-xl bg-red-100 text-red-600";
                iconContainer.innerHTML = '<i data-lucide="waves" class="w-12 h-12"></i>';
                title.innerText = "Cimientos Inestables";
                text.innerText = `Lograste ${score} aciertos. Necesitas entender mejor los fundamentos (mínimo 7). ¡Repasa la construcción y vuelve a intentarlo!`;
                retryBtn.classList.remove('hidden');
            }
            lucide.createIcons();
        }

        loadQuestion();
    </script>
</body>
</html>
