<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trivia L2 | Sentimientos vs Verdades</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <!-- Google Fonts: Outfit -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Outfit', 'sans-serif'],
                    },
                    colors: {
                        brand: {
                            50: '#f5f3ff',
                            100: '#ede9fe',
                            500: '#8b5cf6',
                            600: '#7c3aed',
                            700: '#6d28d9',
                        }
                    }
                }
            }
        }
    </script>
    <style>
        .glass-panel {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(226, 232, 240, 0.8);
        }
        .option-card {
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .option-card:active {
            transform: scale(0.98);
        }
        .progress-bar {
            transition: width 0.4s ease-in-out;
        }
        @keyframes slideIn {
            from { opacity: 0; transform: translateX(20px); }
            to { opacity: 1; transform: translateX(0); }
        }
        .animate-slide {
            animation: slideIn 0.3s ease-out forwards;
        }
    </style>
</head>
<body class="bg-slate-50 min-h-screen font-sans text-slate-900 flex flex-col">

    <!-- Navbar Minimalista -->
    <nav class="p-6">
        <div class="max-w-3xl mx-auto flex justify-between items-center">
            <a href="Leccion_2.html" class="flex items-center gap-2 text-slate-500 hover:text-brand-600 font-bold transition-colors">
                <i data-lucide="x" class="w-5 h-5"></i>
                <span>Salir</span>
            </a>
            <div class="flex items-center gap-2 text-purple-600">
                <span id="current-step" class="font-black">1</span>
                <span class="text-slate-300">/</span>
                <span id="total-steps" class="text-slate-400 font-bold">10</span>
            </div>
        </div>
    </nav>

    <!-- Barra de Progreso Superior -->
    <div class="w-full h-1.5 bg-slate-200">
        <div id="progress" class="progress-bar h-full bg-brand-600 w-[10%]"></div>
    </div>

    <main class="flex-grow flex items-center justify-center p-6">
        <div class="max-w-2xl w-full">
            
            <!-- Contenedor de Preguntas -->
            <div id="quiz-container" class="glass-panel rounded-[2.5rem] p-8 md:p-12 shadow-2xl shadow-purple-500/10 relative overflow-hidden">
                <div id="question-area" class="animate-slide">
                    <!-- Contenido dinámico -->
                </div>
            </div>

            <!-- Pantalla de Resultados -->
            <div id="result-screen" class="hidden text-center animate-slide">
                <div id="result-icon-container" class="w-24 h-24 rounded-full flex items-center justify-center mx-auto mb-8 shadow-xl">
                    <!-- Icono dinámico -->
                </div>
                <h2 id="result-title" class="text-4xl font-black mb-4 text-slate-900">¡Misión de Sanidad!</h2>
                <p id="result-text" class="text-lg text-slate-500 mb-10 leading-relaxed"></p>
                
                <div class="flex flex-col gap-4 max-w-sm mx-auto">
                    <button onclick="location.reload()" id="btn-retry" class="hidden w-full py-4 bg-white border border-slate-200 rounded-2xl font-bold hover:bg-slate-50 transition-all">
                        Intentar de Nuevo
                    </button>
                    <a href="index_e.html" class="w-full py-4 bg-brand-600 text-white rounded-2xl font-bold shadow-lg shadow-brand-500/30 hover:bg-brand-700 transition-all">
                        Volver a Módulos
                    </a>
                </div>
            </div>

        </div>
    </main>

    <script>
        const quizData = [
            {
                question: "¿Qué debemos hacer cuando nuestros sentimientos contradicen la Palabra de Dios?",
                options: ["Hacerles caso para ser sinceros", "Someterlos a la verdad de Dios", "Esperar a que cambien solos"],
                correct: 1
            },
            {
                question: "¿Cuál de estos es el regalo que asegura que nunca estaremos solos?",
                options: ["El Perdón", "El Propósito", "La Presencia"],
                correct: 2
            },
            {
                question: "El regalo del 'Perdón' se explica como un ejercicio respiratorio: Inhalamos...",
                options: ["La gracia y exhalamos el pecado", "El pecado y exhalamos la culpa", "Aire puro solamente"],
                correct: 0
            },
            {
                question: "¿Qué regalo cambia nuestra identidad de 'huérfanos' a 'hijos'?",
                options: ["Paternidad", "Vida Eterna", "Propósito"],
                correct: 0
            },
            {
                question: "¿Qué significa el regalo del 'Propósito'?",
                options: ["Que tengo suerte en la vida", "Que Dios tiene un diseño y plan para mí", "Que puedo hacer lo que yo quiera"],
                correct: 1
            },
            {
                question: "¿Cuándo comienza el regalo de la 'Vida Eterna'?",
                options: ["Cuando morimos", "Al final de los tiempos", "Desde el momento en que recibimos a Cristo"],
                correct: 2
            },
            {
                question: "Si me siento rechazado por los hombres, ¿cuál verdad de 'Paternidad' debo recordar?",
                options: ["Que soy aceptado por mi Padre Celestial", "Que no necesito a nadie", "Que los sentimientos son la única verdad"],
                correct: 0
            },
            {
                question: "¿Por qué los sentimientos pueden ser engañosos?",
                options: ["Porque son malos siempre", "Porque fluctúan según las circunstancias y no sobre la verdad", "Porque no existen"],
                correct: 1
            },
            {
                question: "¿Cuál es el resultado de aplicar las verdades de Dios a nuestras emociones?",
                options: ["Sanidad emocional y paz", "Confusión total", "Ignorar la realidad"],
                correct: 0
            },
            {
                question: "¿Cuál es la base de nuestra seguridad emocional?",
                options: ["Lo que sentimos hoy", "Lo que otros dicen de nosotros", "Lo que Dios ha prometido en Su Palabra"],
                correct: 2
            }
        ];

        let currentQuestion = 0;
        let score = 0;

        const questionArea = document.getElementById('question-area');
        const progress = document.getElementById('progress');
        const currentStepLabel = document.getElementById('current-step');
        const quizContainer = document.getElementById('quiz-container');
        const resultScreen = document.getElementById('result-screen');

        function loadQuestion() {
            const data = quizData[currentQuestion];
            currentStepLabel.innerText = currentQuestion + 1;
            progress.style.width = ((currentQuestion + 1) / quizData.length * 100) + '%';

            questionArea.innerHTML = `
                <h3 class="text-2xl md:text-3xl font-black mb-10 leading-tight text-slate-800">${data.question}</h3>
                <div class="grid gap-4">
                    ${data.options.map((option, index) => `
                        <button onclick="checkAnswer(${index})" class="option-card w-full p-6 text-left rounded-3xl border-2 border-slate-100 hover:border-brand-500 hover:bg-brand-50 font-bold text-slate-700 transition-all flex items-center justify-between group">
                            <span>${option}</span>
                            <i data-lucide="circle" class="w-5 h-5 text-slate-200 group-hover:text-brand-500"></i>
                        </button>
                    `).join('')}
                </div>
            `;
            lucide.createIcons();
        }

        function checkAnswer(selected) {
            if (selected === quizData[currentQuestion].correct) {
                score++;
            }

            currentQuestion++;

            if (currentQuestion < quizData.length) {
                questionArea.classList.remove('animate-slide');
                void questionArea.offsetWidth; 
                questionArea.classList.add('animate-slide');
                loadQuestion();
            } else {
                showResults();
            }
        }

        function showResults() {
            quizContainer.classList.add('hidden');
            resultScreen.classList.remove('hidden');
            
            const pass = score >= 7;
            const iconContainer = document.getElementById('result-icon-container');
            const title = document.getElementById('result-title');
            const text = document.getElementById('result-text');
            const retryBtn = document.getElementById('btn-retry');

            if (pass) {
                iconContainer.className = "w-24 h-24 rounded-full flex items-center justify-center mx-auto mb-8 shadow-xl bg-purple-100 text-purple-600";
                iconContainer.innerHTML = '<i data-lucide="sparkles" class="w-12 h-12"></i>';
                title.innerText = "¡Verdad Triunfante!";
                text.innerText = `Has superado la misión de sanidad con ${score} de ${quizData.length} aciertos. Tus sentimientos ahora siguen a la Verdad.`;
            } else {
                iconContainer.className = "w-24 h-24 rounded-full flex items-center justify-center mx-auto mb-8 shadow-xl bg-red-100 text-red-600";
                iconContainer.innerHTML = '<i data-lucide="heart-off" class="w-12 h-12"></i>';
                title.innerText = "Repaso Necesario";
                text.innerText = `Lograste ${score} aciertos. Necesitamos que las verdades de los 5 regalos estén bien cimentadas (mínimo 7). ¡Vuelve a intentarlo!`;
                retryBtn.classList.remove('hidden');
            }
            lucide.createIcons();
        }

        loadQuestion();
    </script>
</body>
</html>
