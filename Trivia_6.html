<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trivia L6 | La Paternidad</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <!-- Google Fonts: Outfit -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Outfit', 'sans-serif'],
                    },
                    colors: {
                        brand: {
                            50: '#eef2ff',
                            100: '#e0e7ff',
                            500: '#6366f1',
                            600: '#4f46e5',
                            700: '#4338ca',
                        }
                    }
                }
            }
        }
    </script>
    <style>
        .glass-panel {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(226, 232, 240, 0.8);
        }
        .option-card {
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .option-card:active {
            transform: scale(0.98);
        }
        .progress-bar {
            transition: width 0.4s ease-in-out;
        }
        @keyframes slideIn {
            from { opacity: 0; transform: translateX(20px); }
            to { opacity: 1; transform: translateX(0); }
        }
        .animate-slide {
            animation: slideIn 0.3s ease-out forwards;
        }
    </style>
</head>
<body class="bg-slate-50 min-h-screen font-sans text-slate-900 flex flex-col">

    <!-- Navegación Superior -->
    <nav class="p-6">
        <div class="max-w-3xl mx-auto flex justify-between items-center">
            <a href="Leccion_6.html" class="flex items-center gap-2 text-slate-500 hover:text-brand-600 font-bold transition-colors">
                <i data-lucide="x" class="w-5 h-5"></i>
                <span>Salir</span>
            </a>
            <div class="flex items-center gap-2 text-brand-600">
                <span id="current-step" class="font-black">1</span>
                <span class="text-slate-300">/</span>
                <span id="total-steps" class="text-slate-400 font-bold">10</span>
            </div>
        </div>
    </nav>

    <!-- Barra de Progreso -->
    <div class="w-full h-1.5 bg-slate-200">
        <div id="progress" class="progress-bar h-full bg-brand-600 w-[10%]"></div>
    </div>

    <main class="flex-grow flex items-center justify-center p-6">
        <div class="max-w-2xl w-full">
            
            <!-- Contenedor de la Pregunta -->
            <div id="quiz-container" class="glass-panel rounded-[2.5rem] p-8 md:p-12 shadow-2xl shadow-indigo-500/10 relative overflow-hidden">
                <div id="question-area" class="animate-slide">
                    <!-- Se llena con JS -->
                </div>
            </div>

            <!-- Pantalla de Resultados -->
            <div id="result-screen" class="hidden text-center animate-slide">
                <div id="result-icon-container" class="w-24 h-24 rounded-full flex items-center justify-center mx-auto mb-8 shadow-xl">
                    <!-- Icono dinámico -->
                </div>
                <h2 id="result-title" class="text-4xl font-black mb-4 text-slate-900">¡Identidad Confirmada!</h2>
                <p id="result-text" class="text-lg text-slate-500 mb-10 leading-relaxed"></p>
                
                <div class="flex flex-col gap-4 max-w-sm mx-auto">
                    <button onclick="location.reload()" id="btn-retry" class="hidden w-full py-4 bg-white border border-slate-200 rounded-2xl font-bold hover:bg-slate-50 transition-all">
                        Intentar de Nuevo
                    </button>
                    <a href="index_e.html" class="w-full py-4 bg-brand-600 text-white rounded-2xl font-bold shadow-lg shadow-brand-500/30 hover:bg-brand-700 transition-all">
                        Volver a Módulos
                    </a>
                </div>
            </div>

        </div>
    </main>

    <script>
        const quizData = [
            {
                question: "¿Cuál es el regalo que Dios nos da al recibir a Cristo según Juan 1:12?",
                options: ["Tener mucho dinero", "El derecho de ser llamados hijos de Dios", "No volver a tener problemas"],
                correct: 1
            },
            {
                question: "¿Qué significa que Dios nos ama 'incondicionalmente'?",
                options: ["Que nos ama solo si nos portamos bien", "Que Su amor no depende de nuestras obras, sino de Su carácter", "Que nos ama porque somos perfectos"],
                correct: 1
            },
            {
                question: "¿Cuál de estos elementos NO es parte de la Paternidad de Dios?",
                options: ["Protección", "Abandono en momentos de crisis", "Aceptación total"],
                correct: 1
            },
            {
                question: "El término bíblico 'Abba' puede traducirse cariñosamente como:",
                options: ["Juez lejano", "Papito o Padre querido", "Creador del universo"],
                correct: 1
            },
            {
                question: "¿Cómo es la provisión de Dios para Sus hijos?",
                options: ["Él conoce lo que necesitamos antes de que lo pidamos", "Depende de cuánta suerte tengamos", "Él solo provee a los que nunca fallan"],
                correct: 0
            },
            {
                question: "¿Qué debe hacer un hijo cuando falla ante su Padre Celestial?",
                options: ["Esconderse por miedo", "Acercarse confiadamente al trono de la gracia", "Pensar que ya no es Su hijo"],
                correct: 1
            },
            {
                question: "¿Cuál es la base de nuestra aceptación ante Dios?",
                options: ["Nuestras buenas acciones del día", "Lo que Cristo hizo por nosotros", "Lo que otras personas piensen de nosotros"],
                correct: 1
            },
            {
                question: "¿Qué significa que Dios es nuestro protector?",
                options: ["Que Él es nuestro refugio y ayuda siempre presente", "Que nos pone en una burbuja donde nada pasa", "Que nos castiga por cada error"],
                correct: 0
            },
            {
                question: "¿Afecta nuestra conducta nuestra posición como hijos de Dios?",
                options: ["Sí, si pecamos dejamos de ser Sus hijos", "No, nuestra identidad se basa en el nacimiento espiritual", "Depende de la gravedad del pecado"],
                correct: 1
            },
            {
                question: "La mayor herencia de un hijo de Dios en esta tierra es:",
                options: ["Fama y reconocimiento", "Su presencia y amor constantes", "Tener todos los lujos materiales"],
                correct: 1
            }
        ];

        let currentQuestion = 0;
        let score = 0;

        const questionArea = document.getElementById('question-area');
        const progress = document.getElementById('progress');
        const currentStepLabel = document.getElementById('current-step');
        const quizContainer = document.getElementById('quiz-container');
        const resultScreen = document.getElementById('result-screen');

        function loadQuestion() {
            const data = quizData[currentQuestion];
            currentStepLabel.innerText = currentQuestion + 1;
            progress.style.width = ((currentQuestion + 1) / quizData.length * 100) + '%';

            questionArea.innerHTML = `
                <h3 class="text-2xl md:text-3xl font-black mb-10 leading-tight text-slate-800">${data.question}</h3>
                <div class="grid gap-4">
                    ${data.options.map((option, index) => `
                        <button onclick="checkAnswer(${index})" class="option-card w-full p-6 text-left rounded-3xl border-2 border-slate-100 hover:border-brand-500 hover:bg-brand-50 font-bold text-slate-700 transition-all flex items-center justify-between group">
                            <span>${option}</span>
                            <i data-lucide="circle" class="w-5 h-5 text-slate-200 group-hover:text-brand-500"></i>
                        </button>
                    `).join('')}
                </div>
            `;
            lucide.createIcons();
        }

        function checkAnswer(selected) {
            if (selected === quizData[currentQuestion].correct) {
                score++;
            }

            currentQuestion++;

            if (currentQuestion < quizData.length) {
                questionArea.classList.remove('animate-slide');
                void questionArea.offsetWidth; 
                questionArea.classList.add('animate-slide');
                loadQuestion();
            } else {
                showResults();
            }
        }

        function showResults() {
            quizContainer.classList.add('hidden');
            resultScreen.classList.remove('hidden');
            
            const pass = score >= 7;
            const iconContainer = document.getElementById('result-icon-container');
            const title = document.getElementById('result-title');
            const text = document.getElementById('result-text');
            const retryBtn = document.getElementById('btn-retry');

            if (pass) {
                iconContainer.className = "w-24 h-24 rounded-full flex items-center justify-center mx-auto mb-8 shadow-xl bg-indigo-100 text-indigo-600";
                iconContainer.innerHTML = '<i data-lucide="user-check" class="w-12 h-12"></i>';
                title.innerText = "¡Hijo Amado!";
                text.innerText = `Has demostrado que comprendes tu nueva identidad. Lograste ${score} de ${quizData.length} aciertos. ¡Caminas bajo Su protección!`;
            } else {
                iconContainer.className = "w-24 h-24 rounded-full flex items-center justify-center mx-auto mb-8 shadow-xl bg-red-100 text-red-600";
                iconContainer.innerHTML = '<i data-lucide="alert-triangle" class="w-12 h-12"></i>';
                title.innerText = "Sigue Creciendo";
                text.innerText = `Lograste ${score} aciertos. Es vital que tu identidad de hijo sea un hecho firme (mínimo 7). ¡Repasa y vuelve a intentarlo!`;
                retryBtn.classList.remove('hidden');
            }
            lucide.createIcons();
        }

        loadQuestion();
    </script>
</body>
</html>
