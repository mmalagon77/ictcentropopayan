<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trivia L7 | La Gran Comisión</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <!-- Google Fonts: Outfit -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Outfit', 'sans-serif'],
                    },
                    colors: {
                        brand: {
                            50: '#fffbeb',
                            100: '#fef3c7',
                            500: '#f59e0b',
                            600: '#d97706',
                            700: '#b45309',
                        }
                    }
                }
            }
        }
    </script>
    <style>
        .glass-panel {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(226, 232, 240, 0.8);
        }
        .option-card {
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .option-card:active {
            transform: scale(0.98);
        }
        .progress-bar {
            transition: width 0.4s ease-in-out;
        }
        @keyframes slideIn {
            from { opacity: 0; transform: translateX(20px); }
            to { opacity: 1; transform: translateX(0); }
        }
        .animate-slide {
            animation: slideIn 0.3s ease-out forwards;
        }
    </style>
</head>
<body class="bg-slate-50 min-h-screen font-sans text-slate-900 flex flex-col">

    <!-- Navbar Minimalista -->
    <nav class="p-6">
        <div class="max-w-3xl mx-auto flex justify-between items-center">
            <a href="Leccion_7.html" class="flex items-center gap-2 text-slate-500 hover:text-brand-600 font-bold transition-colors">
                <i data-lucide="x" class="w-5 h-5"></i>
                <span>Salir</span>
            </a>
            <div class="flex items-center gap-2 text-brand-600">
                <span id="current-step" class="font-black">1</span>
                <span class="text-slate-300">/</span>
                <span id="total-steps" class="text-slate-400 font-bold">10</span>
            </div>
        </div>
    </nav>

    <!-- Barra de Progreso Superior -->
    <div class="w-full h-1.5 bg-slate-200">
        <div id="progress" class="progress-bar h-full bg-brand-600 w-[10%]"></div>
    </div>

    <main class="flex-grow flex items-center justify-center p-6">
        <div class="max-w-2xl w-full">
            
            <!-- Contenedor de Preguntas -->
            <div id="quiz-container" class="glass-panel rounded-[2.5rem] p-8 md:p-12 shadow-2xl shadow-amber-500/10 relative overflow-hidden">
                <div id="question-area" class="animate-slide">
                    <!-- Contenido dinámico por JS -->
                </div>
            </div>

            <!-- Pantalla de Resultados -->
            <div id="result-screen" class="hidden text-center animate-slide">
                <div id="result-icon-container" class="w-24 h-24 rounded-full flex items-center justify-center mx-auto mb-8 shadow-xl">
                    <!-- Icono dinámico -->
                </div>
                <h2 id="result-title" class="text-4xl font-black mb-4 text-slate-900">¡Misión Cumplida!</h2>
                <p id="result-text" class="text-lg text-slate-500 mb-10 leading-relaxed"></p>
                
                <div class="flex flex-col gap-4 max-w-sm mx-auto">
                    <button onclick="location.reload()" id="btn-retry" class="hidden w-full py-4 bg-white border border-slate-200 rounded-2xl font-bold hover:bg-slate-50 transition-all">
                        Intentar de Nuevo
                    </button>
                    <a href="index_e.html" class="w-full py-4 bg-brand-600 text-white rounded-2xl font-bold shadow-lg shadow-brand-500/30 hover:bg-brand-700 transition-all">
                        Finalizar Curso
                    </a>
                </div>
            </div>

        </div>
    </main>

    <script>
        const quizData = [
            {
                question: "¿Qué es la Gran Comisión según Mateo 28:19-20?",
                options: ["Un consejo para algunos discípulos", "El mandato de Jesús de hacer discípulos a todas las naciones", "Una ley antigua que ya no aplica"],
                correct: 1
            },
            {
                question: "¿Cuál es la promesa de Jesús para quienes cumplen esta misión?",
                options: ["Que serán famosos", "Que Él estará con nosotros todos los días hasta el fin", "Que nunca tendrán dificultades"],
                correct: 1
            },
            {
                question: "Hacer discípulos significa principalmente:",
                options: ["Ayudar a otros a entender y vivir las verdades de Cristo", "Obligar a la gente a ir al templo", "Saberse la Biblia de memoria"],
                correct: 0
            },
            {
                question: "¿A quiénes debe ser compartido el mensaje de restauración?",
                options: ["Solo a las personas buenas", "A toda criatura y a todas las naciones", "Solo a los amigos cercanos"],
                correct: 1
            },
            {
                question: "¿Quiénes están llamados a cumplir la Gran Comisión?",
                options: ["Solo los pastores y líderes", "Cada creyente que ha sido restaurado por Dios", "Solo las personas mayores"],
                correct: 1
            },
            {
                question: "¿Dónde comienza el cumplimiento de nuestra misión?",
                options: ["En un país lejano inmediatamente", "En nuestro entorno cercano (casa, amigos, ciudad)", "Solo dentro de las cuatro paredes del templo"],
                correct: 1
            },
            {
                question: "¿Cuál es el motor o combustible para compartir el mensaje?",
                options: ["El miedo al juicio", "El amor de Dios y la compasión por los demás", "Ganar puntos ante la sociedad"],
                correct: 1
            },
            {
                question: "Enseñando a guardar todas las cosas... significa que:",
                options: ["Debemos dar ejemplo con nuestra vida y testimonio", "Debemos juzgar a los que no saben", "Solo importa la teoría académica"],
                correct: 0
            },
            {
                question: "¿Cuál es el objetivo final de la Gran Comisión?",
                options: ["Tener la iglesia más grande", "La transformación de corazones y naciones por el amor de Dios", "Ganar discusiones religiosas"],
                correct: 1
            },
            {
                question: "Has completado 7 lecciones. ¿Cuál es tu siguiente paso?",
                options: ["Guardar lo aprendido solo para mí", "Vivir lo aprendido y compartirlo con alguien que lo necesite", "Olvidar todo y seguir igual"],
                correct: 1
            }
        ];

        let currentQuestion = 0;
        let score = 0;

        const questionArea = document.getElementById('question-area');
        const progress = document.getElementById('progress');
        const currentStepLabel = document.getElementById('current-step');
        const quizContainer = document.getElementById('quiz-container');
        const resultScreen = document.getElementById('result-screen');

        function loadQuestion() {
            const data = quizData[currentQuestion];
            currentStepLabel.innerText = currentQuestion + 1;
            progress.style.width = ((currentQuestion + 1) / quizData.length * 100) + '%';

            questionArea.innerHTML = `
                <h3 class="text-2xl md:text-3xl font-black mb-10 leading-tight text-slate-800">${data.question}</h3>
                <div class="grid gap-4">
                    ${data.options.map((option, index) => `
                        <button onclick="checkAnswer(${index})" class="option-card w-full p-6 text-left rounded-3xl border-2 border-slate-100 hover:border-brand-500 hover:bg-brand-50 font-bold text-slate-700 transition-all flex items-center justify-between group">
                            <span>${option}</span>
                            <i data-lucide="circle" class="w-5 h-5 text-slate-200 group-hover:text-brand-500"></i>
                        </button>
                    `).join('')}
                </div>
            `;
            lucide.createIcons();
        }

        function checkAnswer(selected) {
            if (selected === quizData[currentQuestion].correct) {
                score++;
            }

            currentQuestion++;

            if (currentQuestion < quizData.length) {
                questionArea.classList.remove('animate-slide');
                void questionArea.offsetWidth; 
                questionArea.classList.add('animate-slide');
                loadQuestion();
            } else {
                showResults();
            }
        }

        function showResults() {
            quizContainer.classList.add('hidden');
            resultScreen.classList.remove('hidden');
            
            const pass = score >= 7;
            const iconContainer = document.getElementById('result-icon-container');
            const title = document.getElementById('result-title');
            const text = document.getElementById('result-text');
            const retryBtn = document.getElementById('btn-retry');

            if (pass) {
                iconContainer.className = "w-24 h-24 rounded-full flex items-center justify-center mx-auto mb-8 shadow-xl bg-amber-100 text-amber-600";
                iconContainer.innerHTML = '<i data-lucide="rocket" class="w-12 h-12"></i>';
                title.innerText = "¡Listo para la Misión!";
                text.innerText = `Has completado el curso con éxito logrando ${score} de ${quizData.length} aciertos. ¡Ahora eres luz en Popayán!`;
            } else {
                iconContainer.className = "w-24 h-24 rounded-full flex items-center justify-center mx-auto mb-8 shadow-xl bg-red-100 text-red-600";
                iconContainer.innerHTML = '<i data-lucide="map-pin-off" class="w-12 h-12"></i>';
                title.innerText = "Revisa tu Misión";
                text.innerText = `Lograste ${score} aciertos. Para completar el curso necesitamos que los fundamentos de la Gran Comisión estén claros (mínimo 7). ¡Vuelve a intentarlo!`;
                retryBtn.classList.remove('hidden');
            }
            lucide.createIcons();
        }

        loadQuestion();
    </script>
</body>
</html>
