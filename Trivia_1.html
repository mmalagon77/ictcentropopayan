<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trivia L1 | El Orden Correcto</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <!-- Google Fonts: Outfit -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Outfit', 'sans-serif'],
                    },
                    colors: {
                        brand: {
                            50: '#f0f7ff',
                            100: '#e0efff',
                            500: '#3b82f6',
                            600: '#2563eb',
                            700: '#1d4ed8',
                        }
                    }
                }
            }
        }
    </script>
    <style>
        .glass-panel {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(226, 232, 240, 0.8);
        }
        .option-card {
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .option-card:active {
            transform: scale(0.98);
        }
        .progress-bar {
            transition: width 0.4s ease-in-out;
        }
        @keyframes slideIn {
            from { opacity: 0; transform: translateX(20px); }
            to { opacity: 1; transform: translateX(0); }
        }
        .animate-slide {
            animation: slideIn 0.3s ease-out forwards;
        }
    </style>
</head>
<body class="bg-slate-50 min-h-screen font-sans text-slate-900 flex flex-col">

    <!-- Navbar Minimalista -->
    <nav class="p-6">
        <div class="max-w-3xl mx-auto flex justify-between items-center">
            <a href="Leccion_1.html" class="flex items-center gap-2 text-slate-500 hover:text-brand-600 font-bold transition-colors">
                <i data-lucide="x" class="w-5 h-5"></i>
                <span>Salir</span>
            </a>
            <div class="flex items-center gap-2">
                <span id="current-step" class="text-brand-600 font-black">1</span>
                <span class="text-slate-300">/</span>
                <span id="total-steps" class="text-slate-400 font-bold">10</span>
            </div>
        </div>
    </nav>

    <!-- Barra de Progreso Superior -->
    <div class="w-full h-1.5 bg-slate-200">
        <div id="progress" class="progress-bar h-full bg-brand-500 w-[10%]"></div>
    </div>

    <main class="flex-grow flex items-center justify-center p-6">
        <div class="max-w-2xl w-full">
            
            <!-- Contenedor de Preguntas -->
            <div id="quiz-container" class="glass-panel rounded-[2.5rem] p-8 md:p-12 shadow-2xl shadow-blue-500/10 relative overflow-hidden">
                <div id="question-area" class="animate-slide">
                    <!-- El contenido se genera por JS -->
                </div>
            </div>

            <!-- Pantalla de Resultados (Oculta por defecto) -->
            <div id="result-screen" class="hidden text-center animate-slide">
                <div id="result-icon-container" class="w-24 h-24 rounded-full flex items-center justify-center mx-auto mb-8 shadow-xl">
                    <!-- Icono dinámico -->
                </div>
                <h2 id="result-title" class="text-4xl font-black mb-4 text-slate-900">¡Misión Completada!</h2>
                <p id="result-text" class="text-lg text-slate-500 mb-10 leading-relaxed"></p>
                
                <div class="flex flex-col gap-4 max-w-sm mx-auto">
                    <button onclick="location.reload()" id="btn-retry" class="hidden w-full py-4 bg-white border border-slate-200 rounded-2xl font-bold hover:bg-slate-50 transition-all">
                        Intentar de Nuevo
                    </button>
                    <a href="index_e.html" class="w-full py-4 bg-brand-600 text-white rounded-2xl font-bold shadow-lg shadow-brand-500/30 hover:bg-brand-700 transition-all">
                        Volver a Módulos
                    </a>
                </div>
            </div>

        </div>
    </main>

    <script>
        const quizData = [
            {
                question: "¿Qué representa la locomotora en la analogía del tren?",
                options: ["Nuestros sentimientos", "Nuestra fe personal", "Los hechos y la verdad de Dios"],
                correct: 2
            },
            {
                question: "¿Cuál es el elemento que impulsa al tren (el combustible)?",
                options: ["Los hechos", "La fe", "La emoción del momento"],
                correct: 1
            },
            {
                question: "¿Qué representa el último vagón del tren?",
                options: ["Los sentimientos", "El motor del cristiano", "La Biblia"],
                correct: 0
            },
            {
                question: "¿Cuál es el orden correcto para que nuestra vida funcione bien?",
                options: ["Sentimientos -> Fe -> Hechos", "Hechos -> Fe -> Sentimientos", "Fe -> Sentimientos -> Hechos"],
                correct: 1
            },
            {
                question: "¿Qué sucede si intentamos que el vagón (sentimientos) jale a la locomotora?",
                options: ["El tren va más rápido", "El tren se descarrila o no avanza", "No pasa nada, es lo mismo"],
                correct: 1
            },
            {
                question: "¿En qué debemos basar nuestra seguridad como cristianos?",
                options: ["En cómo nos sentimos hoy", "En la opinión de los demás", "En la Palabra de Dios (Hechos)"],
                correct: 2
            },
            {
                question: "La fe es el carbón que alimenta la locomotora. Sin locomotora (hechos), ¿qué pasa con el carbón?",
                options: ["Se quema sin propósito", "Funciona igual", "Crea una nueva locomotora"],
                correct: 0
            },
            {
                question: "¿Son malos los sentimientos en la vida cristiana?",
                options: ["Sí, hay que eliminarlos", "No, pero deben seguir a los hechos, no guiarlos", "Son lo más importante de todo"],
                correct: 1
            },
            {
                question: "¿Quién es el conductor principal de este tren?",
                options: ["Nosotros mismos", "Nuestras emociones", "Jesucristo / Dios"],
                correct: 2
            },
            {
                question: "Cuando te sientes solo o triste, ¿qué debes recordar primero?",
                options: ["Que tus sentimientos son la única verdad", "La verdad de que Dios está contigo (Hecho)", "Que necesitas sentir algo fuerte para creer"],
                correct: 1
            }
        ];

        let currentQuestion = 0;
        let score = 0;

        const questionArea = document.getElementById('question-area');
        const progress = document.getElementById('progress');
        const currentStepLabel = document.getElementById('current-step');
        const quizContainer = document.getElementById('quiz-container');
        const resultScreen = document.getElementById('result-screen');

        function loadQuestion() {
            const data = quizData[currentQuestion];
            currentStepLabel.innerText = currentQuestion + 1;
            progress.style.width = ((currentQuestion + 1) / quizData.length * 100) + '%';

            questionArea.innerHTML = `
                <h3 class="text-2xl md:text-3xl font-black mb-10 leading-tight text-slate-800">${data.question}</h3>
                <div class="grid gap-4">
                    ${data.options.map((option, index) => `
                        <button onclick="checkAnswer(${index})" class="option-card w-full p-6 text-left rounded-3xl border-2 border-slate-100 hover:border-brand-500 hover:bg-brand-50 font-bold text-slate-700 transition-all flex items-center justify-between group">
                            <span>${option}</span>
                            <i data-lucide="circle" class="w-5 h-5 text-slate-200 group-hover:text-brand-500"></i>
                        </button>
                    `).join('')}
                </div>
            `;
            lucide.createIcons();
        }

        function checkAnswer(selected) {
            if (selected === quizData[currentQuestion].correct) {
                score++;
            }

            currentQuestion++;

            if (currentQuestion < quizData.length) {
                questionArea.classList.remove('animate-slide');
                void questionArea.offsetWidth; // Trigger reflow
                questionArea.classList.add('animate-slide');
                loadQuestion();
            } else {
                showResults();
            }
        }

        function showResults() {
            quizContainer.classList.add('hidden');
            resultScreen.classList.remove('hidden');
            
            const pass = score >= 7;
            const iconContainer = document.getElementById('result-icon-container');
            const title = document.getElementById('result-title');
            const text = document.getElementById('result-text');
            const retryBtn = document.getElementById('btn-retry');

            if (pass) {
                iconContainer.className = "w-24 h-24 rounded-full flex items-center justify-center mx-auto mb-8 shadow-xl bg-emerald-100 text-emerald-600";
                iconContainer.innerHTML = '<i data-lucide="trophy" class="w-12 h-12"></i>';
                title.innerText = "¡Misión Cumplida!";
                text.innerText = `Has demostrado que conoces el orden correcto. Lograste ${score} de ${quizData.length} aciertos. Estás listo para el siguiente módulo.`;
            } else {
                iconContainer.className = "w-24 h-24 rounded-full flex items-center justify-center mx-auto mb-8 shadow-xl bg-red-100 text-red-600";
                iconContainer.innerHTML = '<i data-lucide="alert-circle" class="w-12 h-12"></i>';
                title.innerText = "Casi lo logras";
                text.innerText = `Obtuviste ${score} aciertos. Necesitas al menos 7 para aprobar esta misión. ¡Repasa la lección y vuelve a intentarlo!`;
                retryBtn.classList.remove('hidden');
            }
            lucide.createIcons();
        }

        // Inicializar
        loadQuestion();
    </script>
</body>
</html>
